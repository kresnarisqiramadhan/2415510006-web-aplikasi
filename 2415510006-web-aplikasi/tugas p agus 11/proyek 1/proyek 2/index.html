<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Proyek 2 - Formulir Validasi Real-time</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="kartu">
    <h2> Formulir Pendaftaran</h2>
    <form id="formulir">

      <div class="field">
        <label>Nama Lengkap</label>
        <input id="nama" type="text" placeholder="Minimal 3 karakter">
        <span class="pesan-error"></span>
      </div>

      <div class="field">
        <label>Alamat Email</label>
        <input id="email" type="email" placeholder="contoh@email.com">
        <span class="pesan-error"></span>
      </div>

      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="Minimal 8 karakter">
        <div class="bilah"><div class="isian"></div></div>
        <span class="label-kekuatan"></span>
        <span class="pesan-error"></span>
      </div>

      <button type="submit">Daftar Sekarang</button>

      <div id="sukses" class="tersembunyi">✅ Berhasil!</div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
